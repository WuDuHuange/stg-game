name: Deploy to GitHub Pages

on:
  push:
    branches: [ "main" ] # 已经修改为你实际的 main 分支
  pull_request:
    branches: [ "main" ]

# 设置 GITHUB_TOKEN 的权限，这是部署到 GitHub Pages 必须的
permissions:
  contents: read
  pages: write
  id-token: write

# 允许一个并发的部署
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # 建议使用新版本

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Fix paths for GitHub Pages
        run: node scripts/fix-paths.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite 默认的打包目录是 dist，如果你的配置不同，请修改这里
          path: './dist' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4